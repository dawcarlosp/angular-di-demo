<section class="explicacion">
  <h2 class="seccion-titulo">Conceptos clave</h2>
  <div class="cards-grid">
    @for (c of conceptos; track c.titulo) {
      <div class="card">
        <div class="card-icono">{{ c.icono }}</div>
        <h3>{{ c.titulo }}</h3>
        <p>{{ c.descripcion }}</p>
      </div>
    }
  </div>
</section>
